name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static site
        run: npm run build:hosting
        env:
          NEXT_PUBLIC_APP_URL: https://nature-colorpalette.web.app
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: nature-colorpalette
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: nature-colorpalette.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: nature-colorpalette.firebasestorage.app

      - name: Authenticate to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_NATURE_COLORPALETTE }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@13.29.1 deploy --only hosting --project nature-colorpalette --non-interactive
